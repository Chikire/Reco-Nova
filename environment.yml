name: reco-nova
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas
  - scipy
  - scikit-learn
  - matplotlib
  - seaborn
  - jupyterlab
  - ipykernel
  - fastapi
  - uvicorn
  - streamlit
  - faiss-cpu
  - pyarrow
  - pyyaml
  - lightfm
  - scikit-surprise
  - pytest
  - pip:
      - kaggle
      - sentence-transformers
      - python-dotenv
      # Keep MLflow on its current major line. The old conda-forge solver can
      # select MLflow 1.2, whose generated code is incompatible with protobuf 6.
      - mlflow>=3.1,<4
      - databricks-sdk>=0.57
